<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Disney Movies</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <h1>Disney Movies</h1>

    <!-- Qui verranno generate le card dei film -->
    <div id="film-container"></div>

    <script>
        // URL del tuo Worker
        const url = "https://test.byronlovexavier.workers.dev";

        async function loadFilms() {
            try {
                const response = await fetch(url);
                const films = await response.json();

                const container = document.getElementById("film-container");
                container.innerHTML = ""; // pulisco eventuale contenuto

                films.forEach(film => {
                    const card = document.createElement("div");
                    card.className = "film-card";

                    card.innerHTML = `
                        <h2>${film.title}</h2>
                        <div class="film-main">
                            <img src="foto/${film.title.toLowerCase().replace(/ /g, "")}.jpg" alt="Copertina ${film.title}">
                            <div class="film-info">
                                <p><strong>Valutazione finale:</strong> ${film.rating}/10</p>
                                <p><strong>Anno:</strong> ${film.year}</p>
                                <p><strong>Visto il:</strong> ${film.date}</p>
                                <p><strong>Voto musiche:</strong> ${film.music}/10</p>
                                <p><strong>Voto scorrevolezza:</strong> ${film.flow}/10</p>
                                <p><strong>Voto trama:</strong> ${film.plot}/10</p>
                                <p><strong>Voto dramma:</strong> ${film.drama}/10</p>
                                <p><strong>Voto divertimento:</strong> ${film.fun}/10</p>
                                <p><strong>Scena preferita:</strong> ${film.favoriteScene}</p>
                            </div>
                        </div>
                        <div class="film-notes">
                            <p><strong>Note:</strong> ${film.notes}</p>
                        </div>
                    `;

                    container.appendChild(card);
                });
            } catch (err) {
                console.error("Errore caricamento film:", err);
            }
        }

        loadFilms();
    </script>
</body>
</html>

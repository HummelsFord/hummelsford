<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu - Il Pozzo</title>
    <meta name="description" content="Il menu del ristorante Il Pozzo">

    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/stylePozzo.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>
<body>

    <div id="header-placeholder"></div>

   <main>
   <section class="container" style="margin-top: 80px; text-align: center;">
        <h2 class="section-title">Il nostro Menu</h2>
        <div style="margin-bottom: 30px;">
            <a href="foto/menu.pdf" download class="btn btn-orange">
                <i class="fas fa-file-download"></i> Scarica il Menu Completo (PDF)
            </a>
        </div>
    </section>

    <section class="pdf-container container">
        <div class="pdf-wrapper">
            <button id="prev-btn" class="pdf-arrow pdf-arrow-left"><i class="fas fa-chevron-left"></i></button>
            <div class="pdf-viewer">
                <canvas id="pdf-canvas"></canvas>
            </div>
            <button id="next-btn" class="pdf-arrow pdf-arrow-right"><i class="fas fa-chevron-right"></i></button>
        </div>
        <div class="pdf-footer" style="display: block; text-align: center; margin-top: 10px;">
            <span class="pdf-page-info">Pagina <span id="page-num">1</span> di <span id="page-count">1</span></span>
        </div>
    </section>
</main>

    <div id="footer-placeholder"></div>



    <!-- PDF Viewer Script -->
    <script>
    let pdfDoc = null;
let pageNum = 1;
let pageRendering = false;
let pageNumPending = null;

const canvas = document.getElementById('pdf-canvas');
const ctx = canvas.getContext('2d');
const pdfViewer = document.querySelector('.pdf-viewer');

pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

function renderPage(num) {
    pageRendering = true;
    pdfDoc.getPage(num).then(function(page) {
        // --- FIX SGRANATURA ---
        // Recuperiamo il fattore di densità (es. 2 o 3 su smartphone moderni)
        const dpr = window.devicePixelRatio || 1;
        
        // Calcoliamo la scala base in base alla larghezza del contenitore
        const containerWidth = pdfViewer.clientWidth;
        let scale = containerWidth / page.getViewport({ scale: 1 }).width;

        // Se siamo su desktop, riduciamo leggermente come nel tuo codice originale
        if (window.innerWidth > 1024) {
            scale *= 0.7; 
        }

        // Creiamo il viewport con la scala corretta moltiplicata per il dpr
        const viewport = page.getViewport({ scale: scale * dpr });
        
        // Impostiamo la dimensione reale del canvas (alta risoluzione)
        canvas.height = viewport.height;
        canvas.width = viewport.width;

        // Impostiamo la dimensione visiva via CSS (dimensione corretta nello schermo)
        canvas.style.width = containerWidth + "px";
        if (window.innerWidth > 1024) canvas.style.width = (containerWidth * 0.7) + "px";
        canvas.style.height = "auto";

        const renderContext = {
            canvasContext: ctx,
            viewport: viewport
        };
        
        const renderTask = page.render(renderContext);
        renderTask.promise.then(function() {
            pageRendering = false;
            if (pageNumPending !== null) {
                renderPage(pageNumPending);
                pageNumPending = null;
            }
        });
    });

    document.getElementById('page-num').textContent = num;
}

function queuePage(num) {
    if (num < 1 || num > pdfDoc.numPages) return;
    if (pageRendering) {
        pageNumPending = num;
    } else {
        renderPage(num);
    }
}

// Navigazione
document.getElementById('prev-btn').addEventListener('click', () => queuePage(--pageNum));
document.getElementById('next-btn').addEventListener('click', () => queuePage(++pageNum));

// --- IMPLEMENTAZIONE SWIPE ---
let touchstartX = 0;
let touchendX = 0;

canvas.addEventListener('touchstart', e => {
    touchstartX = e.changedTouches[0].screenX;
}, false);

canvas.addEventListener('touchend', e => {
    touchendX = e.changedTouches[0].screenX;
    handleGesture();
}, false);

function handleGesture() {
    const threshold = 50; // pixel minimi per attivare lo swipe
    if (touchendX < touchstartX - threshold) {
        // Swipe a sinistra -> Pagina successiva
        if (pageNum < pdfDoc.numPages) {
            pageNum++;
            queuePage(pageNum);
        }
    }
    if (touchendX > touchstartX + threshold) {
        // Swipe a destra -> Pagina precedente
        if (pageNum > 1) {
            pageNum--;
            queuePage(pageNum);
        }
    }
}

// Caricamento PDF
pdfjsLib.getDocument('foto/menu.pdf').promise.then(function(doc) {
    pdfDoc = doc;
    document.getElementById('page-count').textContent = doc.numPages;
    renderPage(pageNum);
});

// Re-render al resize
window.addEventListener('resize', () => {
    if (pdfDoc) renderPage(pageNum);
});



    </script>

</body>
</html>
